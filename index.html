<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PULSE — kinetic lyric engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Archivo:ital,wght@0,100..900;1,100..900&family=Bebas+Neue&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&family=DM+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Space Grotesk',sans-serif}
  #stage{position:fixed;inset:0;display:block}

  .panel{position:fixed;inset:0;z-index:40;display:grid;place-items:start center;
    background:radial-gradient(circle at 50% 35%,rgba(123,61,255,.16),#050407 62%);
    padding:max(24px,env(safe-area-inset-top)) 22px 40px;overflow:auto}
  .wrap{width:min(580px,100%)}
  h1{font-family:'Anton',sans-serif;font-size:clamp(46px,13vw,104px);line-height:.84;text-transform:uppercase}
  h1 span{color:#ff2d6b}
  .sub{margin:12px 0 26px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#8b8499}

  .search{display:flex;gap:10px;margin-bottom:8px}
  .search input{flex:1;background:#0c0a14;border:1px solid #211c33;border-radius:12px;padding:15px 16px;color:#fff;font-family:'Space Grotesk';font-size:16px}
  .search input:focus{outline:none;border-color:#ff2d6b}
  .search button{background:#ff2d6b;border:none;border-radius:12px;color:#fff;padding:0 20px;font-family:'Syne';font-weight:800;font-size:15px;cursor:pointer}
  .hintline{font-family:'DM Mono';font-size:10.5px;letter-spacing:.06em;color:#5f596e;margin-bottom:18px;line-height:1.6}

  .results{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
  .res{display:flex;align-items:center;gap:13px;background:#0c0a14;border:1px solid #211c33;border-radius:12px;padding:10px 12px;cursor:pointer;transition:.14s;text-align:left;color:#fff}
  .res:hover{border-color:#ff2d6b;transform:translateX(3px)}
  .res img{width:46px;height:46px;border-radius:8px;flex:0 0 auto;background:#1a1626}
  .res .t{flex:1;min-width:0}
  .res .t b{font-family:'Syne';font-weight:800;font-size:15px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .res .t small{font-family:'DM Mono';font-size:11px;color:#8b8499;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .res .no{font-family:'DM Mono';font-size:10px;color:#ff5e5e;flex:0 0 auto}

  .divider{display:flex;align-items:center;gap:12px;margin:22px 0 14px;color:#3a3352;font-family:'DM Mono';font-size:11px;letter-spacing:.2em;text-transform:uppercase}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#211c33}

  .songs{display:flex;flex-direction:column;gap:8px}
  .song{appearance:none;cursor:pointer;text-align:left;width:100%;background:#0c0a14;border:1px solid #211c33;border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:14px;transition:.14s;color:#fff}
  .song:hover{border-color:#c6ff2e;transform:translateX(3px)}
  .song .ix{font-family:'Anton';font-size:22px;color:#3a3352;width:28px}
  .song .t{flex:1}.song .t b{font-family:'Syne';font-weight:800;font-size:15px;display:block}
  .song .t small{font-family:'DM Mono';font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#8b8499}
  .song .bpm{font-family:'DM Mono';font-size:11px;color:#c6ff2e}

  .upload{margin-top:14px;border:1px dashed #2c2742;border-radius:12px;padding:15px;text-align:center;font-family:'DM Mono';font-size:11px;letter-spacing:.08em;color:#8b8499;cursor:pointer;transition:.14s}
  .upload:hover{border-color:#23e5ff;color:#23e5ff}.upload input{display:none}

  .status{margin-top:14px;font-family:'DM Mono';font-size:11px;color:#8b8499;min-height:16px}
  .status.err{color:#ff5e5e}

  /* lyric sync mini-tool */
  .lyricbox{margin-top:14px;display:none}
  .lyricbox textarea{width:100%;height:90px;background:#0c0a14;border:1px solid #211c33;border-radius:12px;padding:12px;color:#fff;font-family:'DM Mono';font-size:13px;resize:vertical}
  .lyricbox .row{display:flex;gap:10px;margin-top:10px}
  .lyricbox button{flex:1;background:#161222;border:1px solid #2c2742;border-radius:10px;color:#fff;padding:11px;font-family:'Syne';font-weight:700;cursor:pointer}
  .lyricbox button.go{background:#c6ff2e;color:#07060a;border:none}

  /* transport */
  .chrome{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:16px 20px calc(16px + env(safe-area-inset-bottom));display:none;align-items:center;gap:14px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent)}
  .play{appearance:none;border:none;cursor:pointer;width:52px;height:52px;border-radius:50%;background:#fff;color:#000;display:grid;place-items:center}.play svg{width:20px;height:20px}
  .nowrap{flex:1;min-width:0}.nowrap .n{font-family:'Syne';font-weight:800;font-size:clamp(13px,2.2vw,17px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nowrap .n b{color:#ff2d6b}
  .nowrap .m{margin-top:3px;font-family:'DM Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8b8499}
  .back{appearance:none;background:none;border:1px solid #2c2742;color:#8b8499;border-radius:30px;padding:9px 15px;font-family:'DM Mono';font-size:11px;text-transform:uppercase;cursor:pointer}
  .scrub{position:absolute;left:20px;right:20px;top:0;height:2px;background:#1a1626}.scrub .f{position:absolute;inset:0 100% 0 0;background:#ff2d6b}
  .tapsync{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:21;display:none;background:#c6ff2e;color:#07060a;border:none;border-radius:30px;padding:12px 26px;font-family:'Syne';font-weight:800;font-size:14px;cursor:pointer}
  .phase{position:fixed;top:max(14px,env(safe-area-inset-top));left:20px;z-index:20;font-family:'Anton';font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:#c6ff2e;mix-blend-mode:difference}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="phase" id="phaseEl" aria-hidden="true"></div>

<div class="chrome" id="chrome">
  <div class="scrub"><div class="f" id="fill"></div></div>
  <button class="play" id="play" aria-label="Play"><svg id="pIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
  <div class="nowrap"><div class="n" id="nName"></div><div class="m" id="nMeta"></div></div>
  <button class="back" id="back">back</button>
</div>
<button class="tapsync" id="tapsync">TAP on each lyric →</button>

<div class="panel" id="panel">
  <div class="wrap">
    <h1>PUL<span>SE</span></h1>
    <div class="sub">kinetic lyric engine</div>

    <div class="search">
      <input id="q" type="text" placeholder="Search a song… e.g. Fred again Victory Lap" autocomplete="off">
      <button id="searchBtn">Find</button>
    </div>
    <div class="hintline">Searches Apple's catalog for a free 30-second preview. Plays out loud + reacts live. (Works on the live site, not inside an editor preview.)</div>
    <div class="results" id="results"></div>
    <div class="status" id="status"></div>

    <div class="lyricbox" id="lyricbox">
      <textarea id="lyrictext" placeholder="Paste lyrics here — one line per row — then hit Sync and tap the button in time with the music."></textarea>
      <div class="row">
        <button id="lyricCancel">skip lyrics</button>
        <button id="lyricGo" class="go">sync by tapping →</button>
      </div>
    </div>

    <div class="divider">or demo tracks (synth)</div>
    <div class="songs" id="songs"></div>
    <label class="upload">drop in your own audio file — plays out loud, reacts live<input type="file" id="file" accept="audio/*"></label>
  </div>
</div>

<script>
/* ============================================================
   PULSE — GitHub Pages build
   Paths: (1) iTunes preview search → real audio + manual lyric sync
          (2) synth demo tracks
          (3) file upload
   ============================================================ */
const cv=document.getElementById('stage'),ctx=cv.getContext('2d');
let DPR=Math.min(devicePixelRatio||1,2),W,H;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
resize();addEventListener('resize',resize);
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
const rand=(a,b)=>a+Math.random()*(b-a),pick=a=>a[Math.floor(Math.random()*a.length)];
const $=id=>document.getElementById(id);

/* ---------- audio core ---------- */
let actx,master,comp,analyser,freqData;
let mode='synth';            // synth | file | preview
let playing=false,startTime=0,DUR=18,SPB=.46,PH=[],TR=null;
let audioEl=null,fileSource=null,mediaNode=null;

function ensureCtx(){
  if(actx)return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=.9;
  comp=actx.createDynamicsCompressor();comp.threshold.value=-16;comp.ratio.value=4;
  analyser=actx.createAnalyser();analyser.fftSize=1024;analyser.smoothingTimeConstant=.6;
  master.connect(comp);comp.connect(actx.destination);comp.connect(analyser);
  freqData=new Uint8Array(analyser.frequencyBinCount);
}

/* ============================================================
   TRACK LIBRARY (synth demos)
   ============================================================ */
const BAR=bpm=>(60/bpm)*4;
function LY(t,text,kind){return{t,text,kind,words:text.split(' ')};}
const TRACKS=[
 {id:'tunnel',name:'Neon Tunnel',tag:'peak-time house',bpm:128,accent:'#ff2d6b',pal:['#ff2d6b','#23e5ff','#c6ff2e','#7b3dff'],
  build:b=>[LY(0,'lights down','whisper'),LY(b*1,'feel it rising','build'),LY(b*1.5,'higher','build'),LY(b*1.75,'higher','build'),LY(b*2,'PULSE','drop'),LY(b*3,'lose control','drop'),LY(b*4,'all night long','drop'),LY(b*5,'we don\u2019t stop','groove'),LY(b*6,'breathe','whisper'),LY(b*6.5,'wait for it','build'),LY(b*7,'DROP','drop'),LY(b*8,'electric','drop'),LY(b*9,'fading','whisper')]},
 {id:'fred',name:'Victory Hours',tag:'emotional vocal-chop house',bpm:130,accent:'#ffb13d',pal:['#ffb13d','#ff5e8a','#5ad0ff','#fff1d6'],
  build:b=>[LY(0,'i remember','whisper'),LY(b*.75,'how it felt','whisper'),LY(b*1.5,'and we ran','build'),LY(b*1.75,'and we ran','build'),LY(b*2,'all the way','drop'),LY(b*3,'we made it','drop'),LY(b*4,'you and me','drop'),LY(b*5,'don\u2019t let go','groove'),LY(b*6,'quiet now','whisper'),LY(b*6.75,'one more time','build'),LY(b*7,'we made it','drop'),LY(b*8,'home','drop'),LY(b*9,'stay','whisper')]},
 {id:'pop',name:'Sugar Static',tag:'punchy electro-pop',bpm:118,accent:'#ff4fd8',pal:['#ff4fd8','#42f5e0','#ffe14f','#9b5cff'],
  build:b=>[LY(0,'hey','whisper'),LY(b*.5,'are you ready','build'),LY(b*1,'turn it up','build'),LY(b*2,'SUGAR','drop'),LY(b*2.75,'rush','drop'),LY(b*3.5,'can\u2019t get enough','drop'),LY(b*4.5,'one more time','groove'),LY(b*5.5,'so good','groove'),LY(b*6.5,'hold on','build'),LY(b*7,'SUGAR','drop'),LY(b*8,'rush','drop'),LY(b*9,'gone','whisper')]},
 {id:'deep',name:'Low Tide',tag:'slow dub house',bpm:108,accent:'#5ad0ff',pal:['#5ad0ff','#7b3dff','#2effc2','#ced9ff'],
  build:b=>[LY(0,'deep water','whisper'),LY(b*1,'sinking slow','whisper'),LY(b*2,'into the dark','build'),LY(b*3,'let go','drop'),LY(b*4,'drift','groove'),LY(b*5,'weightless','groove'),LY(b*6,'silence','whisper'),LY(b*7,'rise','build'),LY(b*8,'breathe again','drop'),LY(b*9,'shore','whisper')]},
];
function phasesFor(bpm){const b=BAR(bpm);return[{name:'INTRO',t:0,e:.22},{name:'BUILD',t:b*1.5,e:.5},{name:'DROP',t:b*2,e:1},{name:'GROOVE',t:b*5,e:.78},{name:'BREAK',t:b*6,e:.35},{name:'BUILD',t:b*6.6,e:.6},{name:'DROP',t:b*7,e:1},{name:'OUTRO',t:b*9,e:.25}];}
function phaseAt(t){let p=PH[0];for(const x of PH)if(t>=x.t)p=x;return p;}
function energyEnv(t){const p=phaseAt(t);let e=p.e;const i=PH.indexOf(p);if(p.name==='BUILD'&&PH[i+1]){e=.35+((t-p.t)/(PH[i+1].t-p.t))*.55;}if(p.name==='OUTRO'){e=p.e*(1-Math.min(1,(t-p.t)/(SPB*8)));}return Math.max(0,Math.min(1,e));}

/* ---------- synth instruments ---------- */
function kick(t,a=1){const o=actx.createOscillator(),g=actx.createGain();o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(45,t+.11);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.95*a,t+.004);g.gain.exponentialRampToValueAtTime(.0001,t+.32);o.connect(g);g.connect(master);o.start(t);o.stop(t+.34);}
function bassN(t,f,a){if(a<=0)return;const o=actx.createOscillator(),g=actx.createGain(),lp=actx.createBiquadFilter();o.type='sawtooth';o.frequency.value=f;lp.type='lowpass';lp.frequency.value=440;lp.Q.value=6;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(a,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+SPB*.22);o.connect(lp);lp.connect(g);g.connect(master);o.start(t);o.stop(t+SPB*.3);}
function hat(t,a,c=false){const n=actx.sampleRate*.05,b=actx.createBuffer(1,n,actx.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=actx.createBufferSource();s.buffer=b;const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=c?9000:7000;const g=actx.createGain();g.gain.setValueAtTime(a,t);g.gain.exponentialRampToValueAtTime(.0001,t+(c?.03:.11));s.connect(hp);hp.connect(g);g.connect(master);s.start(t);s.stop(t+.14);}
function stab(t,fs,a){fs.forEach(f=>{const o=actx.createOscillator(),g=actx.createGain(),lp=actx.createBiquadFilter();o.type='sawtooth';o.frequency.value=f;lp.type='lowpass';lp.frequency.value=2600;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(a,t+.006);g.gain.exponentialRampToValueAtTime(.0001,t+.22);o.connect(lp);lp.connect(g);g.connect(master);o.start(t);o.stop(t+.26);});}
function riser(t,dur,a=.3){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(1500,t+dur);g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(a,t+dur*.9);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur);}
function scheduleSynth(){const t0=actx.currentTime+.06,beats=Math.floor(DUR/SPB);for(let i=0;i<beats;i++){const bt=i*SPB,ph=phaseAt(bt),ix=PH.indexOf(ph);if(ph.name==='INTRO'&&bt<SPB*2)continue;const gap=(ph.name==='BUILD'&&PH[ix+1]&&bt>ph.t+(PH[ix+1].t-ph.t)*.75);kick(t0+bt,gap?.35:1);hat(t0+bt+SPB*.5,ph.name==='DROP'?.5:.26);if(energyEnv(bt)>.6){hat(t0+bt+SPB*.25,.12,true);hat(t0+bt+SPB*.75,.12,true);}}const roots=[55,55,65.41,49],bars=Math.floor(DUR/(SPB*4));for(let b=0;b<bars;b++){const bt=b*SPB*4,ph=phaseAt(bt);if(ph.name==='INTRO')continue;const f=roots[b%4],a=energyEnv(bt)*.5;for(let s=0;s<8;s++)bassN(t0+bt+s*(SPB/2),f,a);}const chs=[[220,277,330],[196,247,294]];for(let b=0;b<bars;b++){const bt=b*SPB*4,ph=phaseAt(bt);if(ph.name==='DROP'||ph.name==='GROOVE'){const c=chs[b%2];for(let k=0;k<4;k+=2)stab(t0+bt+k*SPB,c,.16*energyEnv(bt));}}PH.forEach((p,i)=>{if(p.name==='BUILD'&&PH[i+1])riser(t0+p.t,(PH[i+1].t-p.t));});}

/* ---------- analysis ---------- */
let kickEnv=0,flash=0,lastFlash=-1,energy=0,prevLow=0;
function analyze(t){
  analyser.getByteFrequencyData(freqData);
  let low=0;for(let i=0;i<8;i++)low+=freqData[i];low/=(8*255);
  let sum=0;for(let i=0;i<freqData.length;i++)sum+=freqData[i];energy=sum/(freqData.length*255);
  if(mode==='synth'){const ph=(t%SPB)/SPB,on=Math.max(0,1-ph*6);kickEnv=Math.max(on*energyEnv(t),low);
    for(const p of PH){if(p.name==='DROP'&&Math.abs(t-p.t)<.06&&lastFlash<p.t){flash=1;lastFlash=p.t;}}
  } else {
    kickEnv=low*1.5; // real audio drives visuals
    const onset=low-prevLow; if(onset>.18&&energy>.45){flash=Math.min(1,onset*3);} // beat flash from real audio
  }
  prevLow=low; flash*=.9;
}

/* ============================================================
   SCENES (anti-uniform) + render — same engine as before
   ============================================================ */
const FONTS={smash:'Anton',black:'Archivo Black',cond:'Bebas Neue',syne:'Syne',mono:'DM Mono',body:'Space Grotesk'};
function hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h.length===3?h.split('').map(x=>x+x).join(''):h,16);return`rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
let current=null,scene=null,sceneSeed=0,lyricIdx=0;
const SCENES={drop:['cornerSmash','bleed','stack','split','scatter','vertical'],build:['riseTrack','stack','vertical','scatter'],groove:['offset','split','stack','wave'],whisper:['drift','vertical','offset','tiny']};
function newLyric(t,d){current={data:d,born:t};scene=pick(SCENES[d.kind]||SCENES.groove);sceneSeed=Math.random()*1000;
  current.font=d.kind==='drop'?pick([FONTS.smash,FONTS.black,FONTS.cond]):d.kind==='whisper'?pick([FONTS.body,FONTS.mono,FONTS.syne]):pick([FONTS.syne,FONTS.cond,FONTS.black,FONTS.smash]);
  const pal=TR.pal;current.col=pick(pal);current.col2=pick(pal.filter(c=>c!==current.col));current.rot=d.kind==='whisper'?rand(-3,3):rand(-8,8);current.align=pick(['c','l','r']);}
let bgMode=0,bgSwitch=-1;
function drawBg(t,kE){const e=energyEnv(t),ph=phaseAt(t),pIx=PH.indexOf(ph);if(pIx!==bgSwitch){bgSwitch=pIx;bgMode=Math.floor(rand(0,5));}
  if(flash>.04){ctx.fillStyle=hexA(pick(TR.pal),Math.min(.9,flash));ctx.fillRect(0,0,W,H);}else{ctx.fillStyle='#050407';ctx.fillRect(0,0,W,H);}
  if(e>.8&&kE>.7&&!RM&&Math.random()<.25){ctx.fillStyle=hexA('#fff',.5);ctx.fillRect(0,0,W,H);}
  const ac=current?current.col:TR.accent;
  if(bgMode===0){const r=Math.min(W,H)*(.2+kE*.6);const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);g.addColorStop(0,hexA(ac,.18*kE+.04));g.addColorStop(1,hexA(ac,0));ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  else if(bgMode===1){ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-.3);ctx.fillStyle=hexA(ac,.10+.12*kE);ctx.fillRect(-W,-H,W,H*2);ctx.fillStyle=hexA(current?current.col2:'#23e5ff',.08+.1*kE);ctx.fillRect(0,-H,W,H*2);ctx.restore();}
  else if(bgMode===2){if(!RM){const n=10;for(let i=0;i<n;i++){const yy=((t*200*DPR*(e+.2))+(i*H/n))%H;ctx.fillStyle=hexA(ac,.05+.08*kE);ctx.fillRect(0,yy,W,H/n*.4);}}}
  else if(bgMode===3){ctx.strokeStyle=hexA(ac,.08+.12*kE);ctx.lineWidth=DPR;const hz=H*.6,sc=(t*.5)%1;for(let i=0;i<14;i++){const f=(i+sc)/14,y=hz+Math.pow(f,2)*(H-hz);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}for(let i=-7;i<=7;i++){ctx.beginPath();ctx.moveTo(W/2,hz);ctx.lineTo(W/2+i*(W/14),H);ctx.stroke();}}
  else{if(!RM){const N=6;for(let i=0;i<N;i++){const a=t*.3+i*1.7,x=W/2+Math.cos(a)*W*.32,y=H/2+Math.sin(a*1.3)*H*.30,s=(40+i*22)*DPR*(1+kE*.5);ctx.fillStyle=hexA(i%2?ac:(current?current.col2:'#23e5ff'),.06+.06*kE);if(i%2){ctx.beginPath();ctx.arc(x,y,s/2,0,7);ctx.fill();}else ctx.fillRect(x-s/2,y-s/2,s,s);}}}
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.3,W/2,H/2,Math.max(W,H)*.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.55)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);}
function setF(fam,w,size){ctx.font=`${w} ${size}px "${fam}",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';}
function txt(s,x,y,size,fam,w,color){setF(fam,w,size);ctx.fillStyle=color;ctx.fillText(s,x,y);}
function rgb(s,x,y,size,fam,w,c1,c2,kE,al){setF(fam,w,size);if(al)ctx.textAlign=al;const off=(3+kE*6)*DPR+(flash>.1?rand(-6,6)*DPR:0);ctx.globalCompositeOperation='lighter';ctx.fillStyle=hexA(c1,.85);ctx.fillText(s,x-off,y);ctx.fillStyle=hexA(c2,.85);ctx.fillText(s,x+off,y);ctx.globalCompositeOperation='source-over';ctx.fillStyle='#fff';ctx.fillText(s,x,y);ctx.textAlign='center';}
function drawTracked(s,x,y,sp,size,fam,w,color){setF(fam,w,size);ctx.fillStyle=color;const ch=[...s];let tot=0;const wid=ch.map(c=>{const ww=ctx.measureText(c).width;tot+=ww+sp;return ww;});tot-=sp;let cx=x-tot/2;ctx.textAlign='left';ch.forEach((c,i)=>{ctx.fillText(c,cx,y);cx+=wid[i]+sp;});ctx.textAlign='center';}
function drawLyric(t,kE){if(!current)return;const age=t-current.born,d=current.data,base=Math.min(W,H);const inP=Math.min(1,age/.16),ease=1-Math.pow(1-inP,3);const fade=d.kind==='whisper'?Math.max(0,1-Math.max(0,(age-2.4)/1)):1;if(fade<=0)return;const col=current.col,fam=current.font,wght=fam==='Syne'?800:fam==='Space Grotesk'?500:400;ctx.save();ctx.globalAlpha=fade;const S=scene;
  if(S==='cornerSmash'){const size=base*.22*ease;ctx.save();ctx.translate(W*.12,H*.18);ctx.rotate(current.rot*Math.PI/180);rgb(d.text.toUpperCase(),0,0,size,fam,wght,col,current.col2,kE,'left');ctx.restore();}
  else if(S==='bleed'){const size=base*.55*ease*(1+kE*.06);ctx.save();ctx.translate(W/2,H/2);rgb(d.text.toUpperCase(),0,0,size,fam,wght,col,current.col2,kE,'center');ctx.restore();}
  else if(S==='stack'){const ws=d.words,size=base*.16*ease;ws.forEach((w,i)=>{const yy=H/2+(i-(ws.length-1)/2)*size*1.02,xx=W/2+Math.sin(sceneSeed+i)*W*.12;rgb(w.toUpperCase(),xx,yy,size,fam,wght,i%2?col:current.col2,col,kE,'center');});}
  else if(S==='split'){const size=base*.2*ease;ctx.fillStyle=hexA(col,.16);ctx.fillRect(0,H*.38,W,H*.24);txt(d.text.toUpperCase(),W/2,H/2,size,fam,wght,'#fff');}
  else if(S==='scatter'){const ws=d.words,size=base*.12*ease;ws.forEach((w,i)=>{const xx=W*(.2+.6*((i+1)/(ws.length+1)))+Math.sin(sceneSeed+i*2)*W*.08,yy=H*.5+Math.cos(sceneSeed+i*3)*H*.22,rot=Math.sin(sceneSeed+i)*20;ctx.save();ctx.translate(xx,yy);ctx.rotate(rot*Math.PI/180);rgb(w.toUpperCase(),0,0,size*rand(.85,1.25),fam,wght,pick(TR.pal),col,kE,'center');ctx.restore();});}
  else if(S==='vertical'){const chars=[...d.text.replace(/ /g,'')],size=base*.11*ease,x=W*(current.align==='l'?.22:current.align==='r'?.78:.5);chars.forEach((c,i)=>{const yy=H/2+(i-(chars.length-1)/2)*size*1.05;txt(c.toUpperCase(),x,yy,size,fam,wght,i%3?'#fff':col);});}
  else if(S==='riseTrack'){const size=base*.13*ease,climb=-age*55*DPR,sp=(2+age*12)*DPR;drawTracked(d.text.toUpperCase(),W/2,H/2+climb,sp,size,fam,wght,col);}
  else if(S==='offset'){const size=base*.15*ease,x=W*(current.align==='r'?.7:.34);ctx.save();ctx.translate(x,H/2);ctx.rotate(current.rot*Math.PI/180);txt(d.text,0,0,size,fam,wght,'#fff');ctx.fillStyle=hexA(col,.9);const w=ctx.measureText(d.text).width;ctx.fillRect(-w/2,size*.5,w*(.4+.6*kE),4*DPR);ctx.restore();}
  else if(S==='wave'){const chars=[...d.text],size=base*.13*ease;let tot=0;setF(fam,wght,size);const wid=chars.map(c=>{const w=ctx.measureText(c).width;tot+=w;return w;});let cx=W/2-tot/2;ctx.textAlign='left';chars.forEach((c,i)=>{const yy=H/2+Math.sin(t*4+i*.5)*size*.25*(.5+kE);ctx.fillStyle=i%2?col:'#fff';ctx.fillText(c,cx,yy);cx+=wid[i];});ctx.textAlign='center';}
  else if(S==='drift'){const size=base*.08,dx=Math.sin(t*.6)*10*DPR;drawTracked(d.text,W/2+dx,H/2,6*DPR,size,fam,wght,'#fff');}
  else if(S==='tiny'){const size=base*.045;drawTracked(d.text.toUpperCase(),W/2,H/2,14*DPR,size,FONTS.mono,500,col);}
  ctx.restore();}

/* ---------- loop ---------- */
const phaseEl=$('phaseEl'),fillEl=$('fill');
function loop(){if(!playing)return;let t;if(mode==='preview'&&audioEl)t=audioEl.currentTime;else t=actx.currentTime-startTime;
  if(t>=DUR){stop();return;}analyze(t);
  while(lyricIdx<TR.lyrics.length&&t>=TR.lyrics[lyricIdx].t){newLyric(t,TR.lyrics[lyricIdx]);lyricIdx++;}
  drawBg(t,kickEnv);drawLyric(t,kickEnv);phaseEl.textContent=phaseAt(t).name;fillEl.style.right=(100-t/DUR*100)+'%';requestAnimationFrame(loop);}

/* ============================================================
   iTunes SEARCH (direct, CORS-OK)
   ============================================================ */
let pendingPreview=null;
async function search(){
  const q=$('q').value.trim();if(!q)return;
  const st=$('status');st.className='status';st.textContent='searching Apple catalog…';$('results').innerHTML='';
  try{
    const url=`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=6`;
    const r=await fetch(url);const data=await r.json();
    if(!data.results||!data.results.length){st.textContent='no songs found — try artist + title';return;}
    st.textContent='';
    data.results.forEach(s=>{
      const el=document.createElement('button');el.className='res';
      const hasPrev=!!s.previewUrl;
      el.innerHTML=`<img src="${(s.artworkUrl100||'').replace('100x100','200x200')}" alt=""><span class="t"><b>${s.trackName}</b><small>${s.artistName}</small></span>${hasPrev?'':'<span class="no">no preview</span>'}`;
      if(hasPrev)el.onclick=()=>choosePreview(s);else el.style.opacity=.5;
      $('results').appendChild(el);
    });
  }catch(e){st.className='status err';st.textContent='search blocked — make sure you opened the live GitHub Pages URL (not a file:// or editor preview).';}
}
function choosePreview(s){
  pendingPreview={url:s.previewUrl,name:s.trackName,artist:s.artistName,bpm:124,
    pal:['#ff2d6b','#23e5ff','#c6ff2e','#7b3dff','#ffb13d']};
  // show lyric box for manual sync
  $('lyricbox').style.display='block';
  $('status').textContent='Preview ready. Paste lyrics to sync — or skip for pure visuals.';
  $('lyricbox').scrollIntoView({behavior:'smooth',block:'center'});
}

/* ---------- lyric sync tool (tap-to-time) ---------- */
let syncMode=false,syncLines=[],syncTimes=[],syncIx=0;
$('lyricGo').onclick=()=>{
  const raw=$('lyrictext').value.trim();
  syncLines=raw?raw.split('\n').map(l=>l.trim()).filter(Boolean):[];
  startPreview(syncLines.length>0); // if lines exist, enter tap-sync
};
$('lyricCancel').onclick=()=>{syncLines=[];startPreview(false);};

function startPreview(doSync){
  ensureCtx();if(actx.state==='suspended')actx.resume();
  mode='preview';
  TR={name:pendingPreview.name,artist:pendingPreview.artist,bpm:124,accent:'#ff2d6b',pal:pendingPreview.pal};
  SPB=60/124;
  // build/play audio element through analyser
  if(audioEl){try{audioEl.pause()}catch(e){}}
  audioEl=new Audio();audioEl.crossOrigin='anonymous';audioEl.src=pendingPreview.url;
  audioEl.addEventListener('loadedmetadata',()=>{
    DUR=audioEl.duration||30;
    PH=[{name:'INTRO',t:0,e:.3},{name:'BUILD',t:DUR*.16,e:.55},{name:'DROP',t:DUR*.3,e:1},{name:'GROOVE',t:DUR*.48,e:.8},{name:'BREAK',t:DUR*.66,e:.4},{name:'BUILD',t:DUR*.74,e:.6},{name:'DROP',t:DUR*.8,e:1},{name:'OUTRO',t:DUR*.93,e:.3}];
  });
  try{mediaNode=actx.createMediaElementSource(audioEl);mediaNode.connect(master);}catch(e){}
  // lyrics: either tap-sync (assigned live) or none
  if(doSync){
    syncMode=true;syncTimes=[];syncIx=0;
    TR.lyrics=[]; // filled as you tap
    $('tapsync').style.display='block';$('tapsync').textContent=`TAP: "${syncLines[0].slice(0,24)}"`;
  } else {
    syncMode=false;
    // ambient generic marks so visuals still have text rhythm
    TR.lyrics=[LY(0,TR.name,'whisper'),LY(8,'drop','drop'),LY(16,'feel it','groove'),LY(24,'again','drop')];
  }
  openPlayer(TR.name,`${TR.artist} · 30s preview`);
  lyricIdx=0;current=null;bgSwitch=-1;lastFlash=-1;
  audioEl.play().then(()=>{playing=true;setPlayIcon(true);loop();}).catch(()=>{$('status').className='status err';$('status').textContent='tap the play button to start audio.';});
}
// tap-sync handler: each tap assigns current time to next lyric line
$('tapsync').onclick=()=>{
  if(!syncMode||!audioEl)return;
  const t=audioEl.currentTime;const line=syncLines[syncIx];
  const kind=/[A-Z]{3,}|!$/.test(line)?'drop':line.length<8?'build':'groove';
  TR.lyrics.push(LY(t,line,kind));TR.lyrics.sort((a,b)=>a.t-b.t);
  syncIx++;
  if(syncIx>=syncLines.length){$('tapsync').style.display='none';syncMode=false;}
  else $('tapsync').textContent=`TAP: "${syncLines[syncIx].slice(0,24)}"`;
};

/* ============================================================
   SYNTH + FILE playback
   ============================================================ */
function loadSynth(tr){TR={...tr};mode='synth';PH=phasesFor(tr.bpm);SPB=60/tr.bpm;DUR=SPB*4*9.5;TR.lyrics=tr.build(BAR(tr.bpm));}
function startSynth(){ensureCtx();if(actx.state==='suspended')actx.resume();lyricIdx=0;current=null;bgSwitch=-1;lastFlash=-1;startTime=actx.currentTime;scheduleSynth();playing=true;setPlayIcon(true);loop();}

/* ---------- transport / UI ---------- */
function openPlayer(name,meta){$('panel').style.display='none';$('chrome').style.display='flex';$('nName').innerHTML=name.replace(/(\S+)$/,'<b>$1</b>');$('nMeta').textContent=meta;}
function setPlayIcon(p){$('pIcon').innerHTML=p?'<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>';}
function stop(){playing=false;setPlayIcon(false);if(mode==='preview'&&audioEl)audioEl.pause();else if(actx)actx.suspend();}
function resume(){if(mode==='preview'&&audioEl){actx.resume();audioEl.play();playing=true;setPlayIcon(true);loop();}else startSynth();}

$('searchBtn').onclick=search;
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
const songsEl=$('songs');
TRACKS.forEach((tr,i)=>{const b=document.createElement('button');b.className='song';b.innerHTML=`<span class="ix">${String(i+1).padStart(2,'0')}</span><span class="t"><b>${tr.name}</b><small>${tr.tag}</small></span><span class="bpm">${tr.bpm}bpm</span>`;b.onclick=()=>{loadSynth(tr);openPlayer(tr.name,`${tr.tag} · synth`);startSynth();};songsEl.appendChild(b);});
$('file').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;ensureCtx();const buf=await f.arrayBuffer();actx.decodeAudioData(buf,decoded=>{mode='file';TR={name:f.name.replace(/\.[^.]+$/,''),accent:'#ff2d6b',pal:['#ff2d6b','#23e5ff','#c6ff2e','#7b3dff','#ffb13d']};SPB=60/126;DUR=Math.min(decoded.duration,40);PH=[{name:'INTRO',t:0,e:.3},{name:'BUILD',t:DUR*.16,e:.55},{name:'DROP',t:DUR*.3,e:1},{name:'GROOVE',t:DUR*.48,e:.8},{name:'BREAK',t:DUR*.66,e:.4},{name:'DROP',t:DUR*.8,e:1},{name:'OUTRO',t:DUR*.93,e:.3}];TR.lyrics=[LY(0,'your track','whisper'),LY(DUR*.3,'drop','drop'),LY(DUR*.5,'feel it','groove'),LY(DUR*.8,'again','drop')];if(fileSource)try{fileSource.stop()}catch(e){}fileSource=actx.createBufferSource();fileSource.buffer=decoded;fileSource.connect(master);openPlayer(TR.name,'your upload · plays out loud');lyricIdx=0;current=null;bgSwitch=-1;startTime=actx.currentTime;fileSource.start();mode='file';playing=true;setPlayIcon(true);loop();},()=>alert('Could not decode that audio file.'));});

$('play').onclick=()=>{playing?stop():resume();};
$('back').onclick=()=>{stop();if(audioEl)try{audioEl.pause()}catch(e){}if(fileSource)try{fileSource.stop()}catch(e){}$('chrome').style.display='none';$('tapsync').style.display='none';$('panel').style.display='grid';};
addEventListener('keydown',e=>{if(e.code==='Space'&&$('chrome').style.display!=='none'){e.preventDefault();playing?stop():resume();}});
(function idle(){if(playing)return;ctx.fillStyle='#050407';ctx.fillRect(0,0,W,H);requestAnimationFrame(idle);})();
</script>
